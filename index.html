<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM BOOT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple: #cc55ff;
  --pink:   #ff44cc;
  --dark:   #080408;
  --glow:   0 0 20px #cc55ff88, 0 0 60px #cc55ff33;
}

body {
  background: radial-gradient(ellipse at 50% 60%, #12062a 0%, #06020e 70%);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

#scene {
  perspective: 1400px;
  perspective-origin: 50% 40%;
  display: flex; align-items: center; justify-content: center;
  width: 100vw; height: 100vh;
}

#laptop-wrap {
  transform-style: preserve-3d;
  position: relative;
  animation: laptopEntry 1s cubic-bezier(.22,1,.36,1) 0.2s both;
}

@keyframes laptopEntry {
  from { transform: translateY(120px) rotateX(8deg) scale(0.75); opacity: 0; }
  to   { transform: translateY(0)     rotateX(8deg) scale(1);    opacity: 1; }
}

#laptop {
  transform-style: preserve-3d;
  position: relative;
  width: 580px;
}

/* ── LID ── */
#lid {
  position: relative;
  width: 580px;
  height: 370px;
  transform-origin: bottom center;
  transform: rotateX(-94deg);
  animation: openLid 1.6s cubic-bezier(.34,1.1,.64,1) 1.1s forwards;
  transform-style: preserve-3d;
  border-radius: 14px 14px 4px 4px;
}

@keyframes openLid {
  0%   { transform: rotateX(-94deg); }
  55%  { transform: rotateX(6deg); }
  75%  { transform: rotateX(-1deg); }
  90%  { transform: rotateX(2deg); }
  100% { transform: rotateX(0deg); }
}

#lid-front {
  position: absolute;
  inset: 0;
  border-radius: 14px 14px 4px 4px;
  background: linear-gradient(160deg, #2a1a3e 0%, #1e1230 20%, #160d26 45%, #1a1030 60%, #221540 80%, #1a1030 100%);
  box-shadow: inset 0 1px 0 #ffffff20, inset 0 -1px 0 #00000060, 0 -2px 40px #00000088;
  overflow: hidden;
}

#lid-front::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(93deg, transparent 0px, transparent 2px, #ffffff04 2px, #ffffff04 3px);
  border-radius: inherit;
}

#lid-back {
  position: absolute; inset: 0;
  border-radius: 14px 14px 4px 4px;
  background: linear-gradient(160deg, #120a20, #0d0718, #1a1030);
  transform: rotateX(180deg) translateZ(4px);
}

/* ── SCREEN BEZEL ── */
#bezel {
  position: absolute; inset: 0;
  border-radius: 14px 14px 4px 4px;
  background: #0a0612;
  padding: 16px 16px 26px 16px;
  display: flex; flex-direction: column; align-items: center;
}

#webcam {
  width: 7px; height: 7px;
  background: radial-gradient(circle, #1a1a2a 30%, #0d0d1a 100%);
  border-radius: 50%;
  border: 1px solid #2a2a3a;
  margin-bottom: 8px;
  flex-shrink: 0;
  position: relative;
}
#webcam::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 2px; height: 2px;
  background: #4466aa44;
  border-radius: 50%;
}

#screen {
  flex: 1; width: 100%;
  background: #000;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 0 0 1px #ffffff08;
}

#screen::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(180deg, #ffffff07 0%, transparent 100%);
  z-index: 10; pointer-events: none; border-radius: 3px 3px 0 0;
}

#screen::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, #00000018 3px, #00000018 4px);
  pointer-events: none; z-index: 9;
}

#boot-text {
  position: absolute; inset: 0;
  padding: 14px 16px;
  color: #bb88ff;
  font-size: 9.5px;
  line-height: 1.7;
  white-space: pre;
  text-shadow: 0 0 6px #9944ff;
  opacity: 0;
  animation: fadeInBoot 0.3s ease 2.6s forwards;
  z-index: 2;
  overflow: hidden;
}
@keyframes fadeInBoot { to { opacity: 1; } }

/* ── HINGE ── */
#hinge {
  width: 580px; height: 6px;
  background: linear-gradient(180deg, #3a2050 0%, #2a1840 30%, #1e1030 60%, #160c28 100%);
  position: relative; z-index: 5;
  box-shadow: inset 0 1px 0 #ffffff28, inset 0 -1px 0 #00000060;
}
#hinge::before, #hinge::after {
  content: '';
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #4a2866, #1e1030);
  border: 0.5px solid #6633aa40;
  box-shadow: inset 0 1px 0 #ffffff20;
}
#hinge::before { left: 30px; }
#hinge::after  { right: 30px; }

/* ── BASE ── */
#base {
  position: relative;
  width: 580px;
  background: linear-gradient(180deg, #1e1230 0%, #18102a 30%, #140e24 70%, #100c1e 100%);
  border-radius: 4px 4px 16px 16px;
  box-shadow: 0 30px 80px #00000099, 0 4px 0 #0d0818, inset 0 1px 0 #ffffff18, inset 0 -1px 0 #00000040;
  overflow: hidden;
}
#base::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(93deg, transparent 0px, transparent 2px, #ffffff03 2px, #ffffff03 3px);
  pointer-events: none;
}

/* ── KEYBOARD ── */
#keyboard-deck { padding: 12px 24px 8px; }

#fn-row {
  display: flex; gap: 3px; margin-bottom: 5px; align-items: center;
}
.fn-key {
  flex: 1; height: 14px;
  background: linear-gradient(160deg, #2c1a48 0%, #1e1032 100%);
  border-radius: 3px;
  box-shadow: inset 0 1px 0 #ffffff18, 0 1px 0 #00000060, 0 0 0 0.5px #3a1a5a;
}

#keyboard { display: flex; flex-direction: column; gap: 4px; }
.key-row { display: flex; gap: 4px; align-items: center; }

.key {
  height: 32px;
  background: linear-gradient(160deg, #2e1c4e 0%, #1c1030 60%, #22163c 100%);
  border-radius: 4px;
  box-shadow: inset 0 1px 0 #ffffff22, inset 0 -2px 0 #00000060, 0 2px 0 #0a0616, 0 0 0 0.5px #3a1a5a80;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; color: #7744aa80;
  font-family: 'Share Tech Mono', monospace;
  flex-shrink: 0; user-select: none; cursor: default;
}
.key::after {
  content: ''; position: absolute; inset: 3px;
  border-radius: 2px;
  background: linear-gradient(160deg, #ffffff06 0%, transparent 60%);
}

.key-1   { width: 36px; }
.key-1h  { width: 54px; }
.key-bs  { width: 70px; }
.key-tab { width: 54px; }
.key-cap { width: 64px; }
.key-ret { width: 76px; }
.key-sh  { width: 84px; }
.key-sh2 { width: 100px; }
.key-spc { flex: 1; }

@keyframes rgbPulse {
  0%,100% { box-shadow: inset 0 1px 0 #ffffff22, inset 0 -2px 0 #00000060, 0 2px 0 #0a0616, 0 0 0 0.5px #3a1a5a80; }
  50%      { box-shadow: inset 0 1px 0 #ffffff22, inset 0 -2px 0 #00000060, 0 2px 0 #0a0616, 0 0 0 0.5px #cc55ff80, 0 0 8px #cc55ff30; }
}
.g1 { animation: rgbPulse 2s ease-in-out infinite; }
.g2 { animation: rgbPulse 2.4s ease-in-out infinite 0.4s; }
.g3 { animation: rgbPulse 1.8s ease-in-out infinite 0.8s; }

/* ── BOTTOM STRIP ── */
#bottom-strip {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 6px 24px 12px;
}
.speaker { display: flex; flex-direction: column; gap: 2.5px; padding-top: 6px; width: 48px; }
.sh { height: 1.5px; border-radius: 1px; background: #0d0818; box-shadow: 0 0.5px 0 #ffffff10; }

#trackpad {
  flex: 1; height: 90px;
  background: linear-gradient(160deg, #221440 0%, #180e2e 50%, #1e1236 100%);
  border-radius: 8px;
  border: 0.5px solid #3a1a5a60;
  box-shadow: inset 0 1px 0 #ffffff14, inset 0 -1px 0 #00000040, 0 1px 0 #00000060;
  position: relative; overflow: hidden;
}
#trackpad::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(93deg, transparent 0px, transparent 3px, #ffffff03 3px, #ffffff03 4px);
}

#base-bottom {
  width: 580px; height: 8px;
  background: linear-gradient(180deg, #100c1e, #0c0816);
  border-radius: 0 0 16px 16px;
  box-shadow: 0 4px 20px #00000080, inset 0 -1px 0 #ffffff10;
  position: relative;
}
#base-bottom::before, #base-bottom::after {
  content: ''; position: absolute; bottom: 2px;
  width: 24px; height: 4px; background: #06040e; border-radius: 2px;
}
#base-bottom::before { left: 50px; }
#base-bottom::after  { right: 50px; }

#ground-shadow {
  width: 500px; height: 30px; margin: 0 auto;
  background: radial-gradient(ellipse, #cc55ff15 0%, transparent 70%);
  filter: blur(8px);
}

/* ── ZOOM ── */
#zoom-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 100;
  opacity: 0; animation: ovFade 0.5s ease 3.8s forwards;
}
@keyframes ovFade { to { opacity: 1; } }

#zoom-frame {
  width: 170px; height: 170px; position: relative;
  opacity: 0; transform: scale(0.04) translateY(60px);
  animation: zoomIn 2s cubic-bezier(.16,1,.3,1) 4s forwards;
}
@keyframes zoomIn {
  0%   { opacity: 0; transform: scale(0.04) translateY(60px); }
  15%  { opacity: 1; }
  100% { opacity: 1; transform: scale(5.8) translateY(0); }
}

#cpu {
  width: 170px; height: 170px; position: relative;
  background: #080410;
  border: 1.5px solid #3a1a5a;
  box-shadow: 0 0 0 5px #0d0818, 0 0 40px #cc55ff44;
}

#pcb {
  position: absolute; inset: -10px;
  background: linear-gradient(135deg, #0e1420, #0a0e18, #0c1218);
  z-index: -1; border: 1px solid #1a2a20;
}

#pads {
  position: absolute; inset: -12px;
  display: grid;
  grid-template-columns: repeat(26, 1fr);
  grid-template-rows: repeat(26, 1fr);
  gap: 0.8px; z-index: -1;
}
.pad { background: #c8a040; border-radius: 50%; width: 2.5px; height: 2.5px; margin: auto; opacity: 0.75; }

#ihs {
  position: absolute; inset: 5px; border-radius: 3px;
  background: linear-gradient(135deg, #c8d5e0 0%, #a0b0c0 15%, #d0dde8 30%, #98aabb 45%, #ccd8e4 55%, #a8b8c8 70%, #d4e0ea 85%, #b0c0d0 100%);
  box-shadow: inset 0 1px 2px #ffffff80, inset 0 -1px 1px #00000030, 0 2px 8px #00000060;
  display: flex; align-items: center; justify-content: center;
}
#ihs::before {
  content: ''; position: absolute; top: 10%; left: 15%;
  width: 30%; height: 8px;
  background: linear-gradient(90deg, transparent, #ffffff40, transparent);
  transform: rotate(-10deg); border-radius: 4px;
}
#ihs-label {
  position: absolute; text-align: center;
  font-family: 'Share Tech Mono', monospace; color: #3a4e60; z-index: 2; line-height: 1.6;
}
#ihs-label .brand { font-size: 8px; letter-spacing: 0.15em; font-weight: bold; color: #2a3e50; }
#ihs-label .model { font-size: 6px; letter-spacing: 0.1em; }
#ihs-label .spec  { font-size: 5px; letter-spacing: 0.08em; color: #4a6070; margin-top: 2px; }

#die-content {
  position: absolute; inset: 0;
  opacity: 0; animation: dieReveal 0.8s ease 5.4s forwards;
}
@keyframes dieReveal { to { opacity: 1; } }

/* ── FINAL ── */
#final-content {
  position: fixed; inset: 0;
  background: var(--dark);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; z-index: 200;
  animation: finalReveal 1s ease 6.6s forwards;
}
@keyframes finalReveal {
  0%   { opacity: 0; background: #cc55ff; }
  8%   { opacity: 1; background: #cc55ff; }
  30%  { background: var(--dark); opacity: 1; }
  100% { opacity: 1; pointer-events: all; }
}
#final-content::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(#cc55ff08 1px, transparent 1px), linear-gradient(90deg, #cc55ff08 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none;
}
#final-content h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900;
  color: var(--purple); text-shadow: var(--glow); letter-spacing: 0.15em;
}
#final-content p {
  color: #6a3a8a; font-size: 0.85rem; letter-spacing: 0.4em;
  margin-top: 14px; text-transform: uppercase;
  animation: fadeUp 0.8s ease 7.2s both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

#cta {
  margin-top: 48px; padding: 14px 52px;
  border: 1px solid var(--purple); color: var(--purple);
  font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 0.3em;
  text-transform: uppercase; cursor: pointer; background: transparent; transition: all 0.3s;
  animation: fadeUp 0.8s ease 7.6s both; position: relative; overflow: hidden;
}
#cta::before {
  content: ''; position: absolute; inset: 0;
  background: var(--purple); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; z-index: -1;
}
#cta:hover { color: var(--dark); }
#cta:hover::before { transform: scaleX(1); }

.trail {
  position: fixed; border-radius: 50%;
  background: var(--purple); pointer-events: none; z-index: 9999; mix-blend-mode: screen;
}
</style>
</head>
<body>
<div id="scene">
  <div id="laptop-wrap">
    <div id="laptop">

      <div id="lid">
        <div id="lid-back"></div>
        <div id="lid-front">
          <div id="bezel">
            <div id="webcam"></div>
            <div id="screen">
              <div id="boot-text"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="hinge"></div>

      <div id="base">
        <div id="keyboard-deck">
          <div id="fn-row">
            <div class="fn-key" style="width:28px"></div>
            <div style="flex:1;display:flex;gap:3px">
              <div class="fn-key"></div><div class="fn-key"></div><div class="fn-key"></div><div class="fn-key"></div>
              <div class="fn-key" style="margin-left:6px"></div><div class="fn-key"></div><div class="fn-key"></div><div class="fn-key"></div>
              <div class="fn-key" style="margin-left:6px"></div><div class="fn-key"></div><div class="fn-key"></div><div class="fn-key"></div>
            </div>
            <div class="fn-key" style="width:28px"></div>
          </div>
          <div id="keyboard">
            <div class="key-row">
              <div class="key key-1 g1">~</div><div class="key key-1">1</div><div class="key key-1">2</div>
              <div class="key key-1 g2">3</div><div class="key key-1">4</div><div class="key key-1">5</div>
              <div class="key key-1 g3">6</div><div class="key key-1">7</div><div class="key key-1">8</div>
              <div class="key key-1 g1">9</div><div class="key key-1">0</div><div class="key key-1">-</div>
              <div class="key key-1">=</div><div class="key key-bs g2">⌫</div>
            </div>
            <div class="key-row">
              <div class="key key-tab g3">TAB</div>
              <div class="key key-1">Q</div><div class="key key-1 g1">W</div><div class="key key-1">E</div>
              <div class="key key-1 g2">R</div><div class="key key-1">T</div><div class="key key-1">Y</div>
              <div class="key key-1 g3">U</div><div class="key key-1">I</div><div class="key key-1">O</div>
              <div class="key key-1 g1">P</div><div class="key key-1">[</div><div class="key key-1">]</div>
              <div class="key key-1">\</div>
            </div>
            <div class="key-row">
              <div class="key key-cap g2">CAPS</div>
              <div class="key key-1">A</div><div class="key key-1 g3">S</div><div class="key key-1">D</div>
              <div class="key key-1 g1">F</div><div class="key key-1">G</div><div class="key key-1">H</div>
              <div class="key key-1 g2">J</div><div class="key key-1">K</div><div class="key key-1 g3">L</div>
              <div class="key key-1">;</div><div class="key key-1">'</div>
              <div class="key key-ret g1">ENTER</div>
            </div>
            <div class="key-row">
              <div class="key key-sh g2">⇧ SHIFT</div>
              <div class="key key-1 g3">Z</div><div class="key key-1">X</div><div class="key key-1 g1">C</div>
              <div class="key key-1">V</div><div class="key key-1">B</div><div class="key key-1 g2">N</div>
              <div class="key key-1">M</div><div class="key key-1">,</div><div class="key key-1 g3">.</div>
              <div class="key key-1">/</div><div class="key key-sh2 g1">SHIFT ⇧</div>
            </div>
            <div class="key-row">
              <div class="key key-1h g2">CTRL</div>
              <div class="key key-1 g3">⌘</div>
              <div class="key key-1h g1">ALT</div>
              <div class="key key-spc"></div>
              <div class="key key-1h g2">ALT</div>
              <div class="key key-1 g3">FN</div>
              <div class="key key-1">◀</div>
              <div style="display:flex;flex-direction:column;gap:4px">
                <div class="key key-1" style="height:14px">▲</div>
                <div class="key key-1" style="height:14px">▼</div>
              </div>
              <div class="key key-1">▶</div>
            </div>
          </div>
        </div>

        <div id="bottom-strip">
          <div class="speaker">
            <div class="sh"></div><div class="sh"></div><div class="sh"></div><div class="sh"></div>
            <div class="sh"></div><div class="sh"></div><div class="sh"></div><div class="sh"></div>
          </div>
          <div id="trackpad"></div>
          <div class="speaker">
            <div class="sh"></div><div class="sh"></div><div class="sh"></div><div class="sh"></div>
            <div class="sh"></div><div class="sh"></div><div class="sh"></div><div class="sh"></div>
          </div>
        </div>
      </div>

      <div id="base-bottom"></div>
      <div id="ground-shadow"></div>
    </div>
  </div>
</div>

<!-- CPU ZOOM -->
<div id="zoom-overlay">
  <div id="zoom-frame">
    <div id="cpu">
      <div id="pcb"></div>
      <div id="pads"></div>
      <div id="ihs">
        <div id="ihs-label">
          <div class="brand">CORE X9</div>
          <div class="model">5nm ULTRA</div>
          <div class="spec">5.8 GHz · 24C/32T</div>
        </div>
      </div>
      <div id="die-content">
        <svg viewBox="0 0 160 160" width="160" height="160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="diebg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0e0818"/><stop offset="100%" stop-color="#060410"/>
            </linearGradient>
            <filter id="gl"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ffffff05"/><stop offset="100%" stop-color="transparent"/>
            </linearGradient>
          </defs>
          <rect width="160" height="160" fill="url(#diebg)"/>
          <rect x=".5" y=".5" width="159" height="159" fill="none" stroke="#3a1a5a" stroke-width="1"/>
          <g stroke="#cc55ff15" stroke-width="0.3" fill="none">
            <line x1="50" y1="0" x2="50" y2="160"/><line x1="96" y1="0" x2="96" y2="160"/>

            <line x1="0" y1="110" x2="160" y2="110"/>
          </g>
          <g filter="url(#gl)">
            <rect x="6" y="6" width="42" height="42" fill="#160828" stroke="#cc55ff" stroke-width="0.6"/><rect x="6" y="6" width="42" height="42" fill="url(#bg2)"/>
            <text x="27" y="24" fill="#cc55ff" font-size="5.5" text-anchor="middle" font-family="monospace" font-weight="bold">CORE 0</text>
            <text x="27" y="33" fill="#cc55ff88" font-size="4" text-anchor="middle" font-family="monospace">P-CORE</text>
            <text x="27" y="41" fill="#cc55ff55" font-size="3.5" text-anchor="middle" font-family="monospace">5.8GHz</text>

            <rect x="52" y="6" width="42" height="42" fill="#160828" stroke="#cc55ff" stroke-width="0.6"/><rect x="52" y="6" width="42" height="42" fill="url(#bg2)"/>
            <text x="73" y="24" fill="#cc55ff" font-size="5.5" text-anchor="middle" font-family="monospace" font-weight="bold">CORE 1</text>
            <text x="73" y="33" fill="#cc55ff88" font-size="4" text-anchor="middle" font-family="monospace">P-CORE</text>
            <text x="73" y="41" fill="#cc55ff55" font-size="3.5" text-anchor="middle" font-family="monospace">5.8GHz</text>

<script>
// Boot text
const BOOT = `UEFI BIOS v4.2.1  ·  Secure Boot ON
────────────────────────────────────
CPU: CORE X9 5nm ULTRA  5.8GHz  [OK]
RAM: 64 GB DDR6-8400 ×4         [OK]
GPU: Arc iGPU 128EU              [OK]
NVMe: 4 TB PCIe 5.0 Gen5        [OK]
TPM: 2.0 Active                 [OK]

Loading ACPI tables ...         [OK]
Init power management ...       [OK]
Kernel modules ...              [OK]

> BOOT COMPLETE — Zooming to die
▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ 100%`;

const bootEl = document.getElementById('boot-text');
let idx = 0;
function typeChar() { if (idx < BOOT.length) { bootEl.textContent += BOOT[idx++]; setTimeout(typeChar, 16); } }
setTimeout(typeChar, 2700);

// CPU pads
const padsEl = document.getElementById('pads');
for (let i = 0; i < 676; i++) {
  const p = document.createElement('div');
  p.className = 'pad';
  if (Math.random() > 0.82) p.style.opacity = '0';
  padsEl.appendChild(p);
}

// Trail
const N = 14;
const trails = Array.from({ length: N }, (_, i) => {
  const el = document.createElement('div');
  el.className = 'trail';
  const s = Math.max(2, 6 - i * 0.35);
  el.style.cssText = `width:${s}px;height:${s}px;opacity:${(1-i/N)*0.65};`;
  document.body.appendChild(el);
  return el;
});
let mouse = { x: -200, y: -200 };
let pos = Array(N).fill({ x: -200, y: -200 });
document.addEventListener('mousemove', e => mouse = { x: e.clientX, y: e.clientY });
(function loop() {
  pos = [mouse, ...pos.slice(0, N - 1)];
  trails.forEach((el, i) => { el.style.left = pos[i].x - 3 + 'px'; el.style.top = pos[i].y - 3 + 'px'; });
  requestAnimationFrame(loop);
})();

document.getElementById('cta').addEventListener('click', () => {
  document.body.style.transition = 'background 0.2s';
  document.body.style.background = '#cc55ff';
  setTimeout(() => document.body.style.background = '', 250);
});
</script>
